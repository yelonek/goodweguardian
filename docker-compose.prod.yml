services:
  guardian:
    build: .
    image: goodweguardian:latest
    container_name: guardian
    restart: unless-stopped
    env_file: .env
    environment:
      TZ: Europe/Warsaw
    command: ["python", "hourly_balance_run.py"]
    volumes:
      - ./logs:/app/logs
      - ./state:/app/state
      - ./data:/app/data

  dashboard:
    image: goodweguardian:latest
    container_name: guardian-dashboard
    restart: unless-stopped
    depends_on: [guardian]
    env_file: .env
    environment:
      TZ: Europe/Warsaw
    command: ["uvicorn", "guardian_dashboard:app", "--host", "0.0.0.0", "--port", "8501"]
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
      - ./state:/app/state
      - ./data:/app/data
